name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify tag matches package version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            exit 0
          fi

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "::error::Git tag ${GITHUB_REF_NAME} does not match package.json version ${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ADE-windows-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
            dist/*.zip
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" --generate-notes --title "${TAG}"
          fi

          shopt -s nullglob
          files=(dist/*.exe dist/*.yml dist/*.blockmap dist/*.zip)

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No release files were found in dist/"
            exit 1
          fi

          gh release upload "${TAG}" "${files[@]}" --clobber
